<mat-sidenav-container class="sidenav-container" [class]="theme()">

  <mat-sidenav #sidenav class="sidenav" mode="side" opened>
    <!-- Sidenav header -->
    <mat-toolbar class="sidenav-toolbar">
      <span class="app-brand">{{ title }}</span>
    </mat-toolbar>

    <!-- Navigation list -->
    <mat-nav-list>
      @for (item of navItems; track item.route) {
        <a
          mat-list-item
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <!-- Top toolbar -->
    <mat-toolbar class="top-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle sidenav">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ title }}</span>
      <span class="toolbar-spacer"></span>
      <button
        mat-icon-button
        (click)="toggleTheme()"
        [matTooltip]="theme() === 'va-corporate' ? 'Switch to dark' : 'Switch to light'"
        aria-label="Toggle theme">
        <mat-icon>{{ theme() === 'va-corporate' ? 'dark_mode' : 'light_mode' }}</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Page content -->
    <div class="page-content">
      <router-outlet />
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
